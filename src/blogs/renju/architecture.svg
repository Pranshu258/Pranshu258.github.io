<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- ── Input ── -->
  <rect x="20" y="165" width="110" height="90" rx="8" fill="#1e3a5f" stroke="#4a7fbf" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="75" y="200" text-anchor="middle" fill="#a8c8f0" font-size="11" font-weight="600">Input</text>
  <text x="75" y="218" text-anchor="middle" fill="#7ab0e0" font-size="10">3 × 15 × 15</text>
  <text x="75" y="234" text-anchor="middle" fill="#607090" font-size="9">float32</text>

  <!-- plane labels -->
  <text x="75" y="252" text-anchor="middle" fill="#506880" font-size="8.5">my / opp / side</text>

  <!-- arrow: input → conv -->
  <line x1="131" y1="210" x2="156" y2="210" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Input Conv Block ── -->
  <rect x="158" y="150" width="105" height="120" rx="8" fill="#1a3d2e" stroke="#3a8c5e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="183" text-anchor="middle" fill="#6dbd96" font-size="11" font-weight="600">Input Block</text>
  <text x="210" y="201" text-anchor="middle" fill="#4a9e78" font-size="9.5">Conv2d 3→64</text>
  <text x="210" y="216" text-anchor="middle" fill="#4a9e78" font-size="9.5">kernel 3×3</text>
  <text x="210" y="231" text-anchor="middle" fill="#4a9e78" font-size="9.5">BatchNorm2d</text>
  <text x="210" y="246" text-anchor="middle" fill="#4a9e78" font-size="9.5">ReLU</text>
  <text x="210" y="262" text-anchor="middle" fill="#3a7e5e" font-size="8.5">→ 64 × 15 × 15</text>

  <!-- arrow: conv → tower -->
  <line x1="264" y1="210" x2="289" y2="210" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Residual Tower ── -->
  <rect x="291" y="120" width="175" height="180" rx="8" fill="#2a1e40" stroke="#7a5cbf" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="378" y="150" text-anchor="middle" fill="#b09ae0" font-size="12" font-weight="700">Residual Tower</text>
  <text x="378" y="167" text-anchor="middle" fill="#8878c8" font-size="10">× 6 blocks</text>

  <!-- ResBlock detail -->
  <rect x="311" y="176" width="135" height="105" rx="6" fill="#1e1530" stroke="#5a4a9f" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="378" y="196" text-anchor="middle" fill="#9080d0" font-size="10" font-weight="600">ResBlock</text>
  <text x="378" y="213" text-anchor="middle" fill="#7060b0" font-size="9">Conv2d 64→64, 3×3</text>
  <text x="378" y="228" text-anchor="middle" fill="#7060b0" font-size="9">BatchNorm + ReLU</text>
  <text x="378" y="243" text-anchor="middle" fill="#7060b0" font-size="9">Conv2d 64→64, 3×3</text>
  <text x="378" y="258" text-anchor="middle" fill="#7060b0" font-size="9">BatchNorm</text>
  <text x="378" y="273" text-anchor="middle" fill="#9070c0" font-size="9">+ skip connection</text>
  <!-- skip arrow -->
  <path d="M311,230 Q295,230 295,258 Q295,276 311,276" fill="none" stroke="#5a4a9f" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrow)"/>

  <text x="378" y="295" text-anchor="middle" fill="#6050a0" font-size="8.5">→ 64 × 15 × 15</text>

  <!-- fork arrow -->
  <line x1="467" y1="210" x2="502" y2="210" stroke="#888" stroke-width="1.5"/>
  <!-- fork to policy -->
  <polyline points="502,210 502,155 522,155" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- fork to value -->
  <polyline points="502,210 502,265 522,265" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Policy Head ── -->
  <rect x="524" y="100" width="130" height="115" rx="8" fill="#3a2010" stroke="#bf7030" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="589" y="127" text-anchor="middle" fill="#e09040" font-size="11" font-weight="700">Policy Head</text>
  <text x="589" y="145" text-anchor="middle" fill="#c07030" font-size="9">Conv2d 64→2, 1×1</text>
  <text x="589" y="160" text-anchor="middle" fill="#c07030" font-size="9">BatchNorm + ReLU</text>
  <text x="589" y="175" text-anchor="middle" fill="#c07030" font-size="9">Flatten</text>
  <text x="589" y="190" text-anchor="middle" fill="#c07030" font-size="9">Linear 450 → 225</text>
  <text x="589" y="208" text-anchor="middle" fill="#e09040" font-size="9.5" font-weight="600">→ 225 logits</text>

  <!-- ── Value Head ── -->
  <rect x="524" y="215" width="130" height="120" rx="8" fill="#1a3a20" stroke="#40a060" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="589" y="242" text-anchor="middle" fill="#60c080" font-size="11" font-weight="700">Value Head</text>
  <text x="589" y="260" text-anchor="middle" fill="#40a060" font-size="9">Conv2d 64→1, 1×1</text>
  <text x="589" y="275" text-anchor="middle" fill="#40a060" font-size="9">BatchNorm + ReLU</text>
  <text x="589" y="290" text-anchor="middle" fill="#40a060" font-size="9">Linear 225 → 64 → 1</text>
  <text x="589" y="305" text-anchor="middle" fill="#40a060" font-size="9">Tanh</text>
  <text x="589" y="323" text-anchor="middle" fill="#60c080" font-size="9.5" font-weight="600">→ value ∈ [−1, +1]</text>

  <!-- ── Output boxes ── -->
  <!-- policy output -->
  <line x1="655" y1="155" x2="680" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="682" y="115" width="90" height="80" rx="7" fill="#2d1a06" stroke="#bf7030" stroke-width="1.2"/>
  <text x="727" y="145" text-anchor="middle" fill="#e09040" font-size="10.5" font-weight="700">Policy</text>
  <text x="727" y="162" text-anchor="middle" fill="#c07030" font-size="9">225 move</text>
  <text x="727" y="176" text-anchor="middle" fill="#c07030" font-size="9">probabilities</text>

  <!-- value output -->
  <line x1="655" y1="270" x2="680" y2="270" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="682" y="235" width="90" height="70" rx="7" fill="#0d2010" stroke="#40a060" stroke-width="1.2"/>
  <text x="727" y="263" text-anchor="middle" fill="#60c080" font-size="10.5" font-weight="700">Value</text>
  <text x="727" y="280" text-anchor="middle" fill="#40a060" font-size="9">win estimate</text>
  <text x="727" y="294" text-anchor="middle" fill="#40a060" font-size="9">∈ [−1, +1]</text>

  <!-- ── Input plane annotations ── -->
  <text x="20" y="290" fill="#506880" font-size="8.5" font-style="italic">Plane 0: my stones</text>
  <text x="20" y="304" fill="#506880" font-size="8.5" font-style="italic">Plane 1: opp stones</text>
  <text x="20" y="318" fill="#506880" font-size="8.5" font-style="italic">Plane 2: side to move</text>

  <!-- ── Title ── -->
  <text x="390" y="30" text-anchor="middle" fill="#c0c8d8" font-size="14" font-weight="700" letter-spacing="0.5">RenjuNet — AlphaZero-style Policy + Value Network</text>
  <text x="390" y="50" text-anchor="middle" fill="#707888" font-size="11">6 residual blocks · 64 channels · 562k parameters · ~2.3 MB ONNX</text>

  <!-- ── Shared trunk label ── -->
  <text x="378" y="380" text-anchor="middle" fill="#6050a0" font-size="9.5" font-style="italic">shared trunk (policy and value co-trained)</text>
  <line x1="291" y1="370" x2="467" y2="370" stroke="#5a4a9f" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="291" y1="370" x2="291" y2="300" stroke="#5a4a9f" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="467" y1="370" x2="467" y2="300" stroke="#5a4a9f" stroke-width="0.8" stroke-dasharray="4,3"/>
</svg>
